<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QTV - HDPE Premier League</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --val-red: #ff4655; 
            --val-dark: #0f1923; 
            --val-card: #1f2d3d; 
            --val-text: #ece8e1; 
            --val-gray: #768079; 
            --val-yellow: #ffd700; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--val-dark); color: var(--val-text); padding: 20px; }
        .container { max-width: 1000px; margin: 20px auto; background: var(--val-card); padding: 30px; border-top: 5px solid var(--val-red); }
        h1, h2 { color: var(--val-text); text-transform: uppercase; margin-bottom: 20px; }
        .section { margin-bottom: 40px; background: rgba(0,0,0,0.3); padding: 20px; border: 1px solid var(--val-gray); }
        input, select, button { padding: 10px; margin: 5px 0; background: var(--val-dark); border: 1px solid #334455; color: white; width: 100%; }
        button { background: var(--val-red); font-weight: bold; cursor: pointer; text-transform: uppercase; border: none; }
        button:hover { background: #e03e4d; }
        button.btn-green { background: #28a745; }
        button.btn-green:hover { background: #218838; }
        button.btn-yellow { background: var(--val-yellow); color: black; }
        button.btn-yellow:hover { background: #e0a800; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #334455; padding: 10px; text-align: left; font-size: 14px; }
        th { background: #151c24; color: var(--val-red); }
        .match-box { background: rgba(255,255,255,0.05); padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--val-red); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hệ Thống Quản Trị Giải Đấu (Admin Panel)</h1>

    <!-- KHỐI ĐĂNG NHẬP -->
    <div id="loginSection" class="section">
        <h2>Đăng Nhập QTV</h2>
        <input type="text" id="adminUser" placeholder="Tài khoản (mặc định: admin)">
        <input type="password" id="adminPass" placeholder="Mật khẩu (mặc định: admin123)">
        <button onclick="loginAdmin()">Đăng Nhập</button>
    </div>

    <!-- KHỐI QUẢN TRỊ -->
    <div id="adminDashboard" style="display: none;">
        <div class="section" style="text-align: center; border-color: var(--val-yellow);">
            <h3 style="color: var(--val-yellow); margin-bottom: 10px;">TRẠNG THÁI TRANG CHỦ</h3>
            <p id="publishStatusText" style="margin-bottom: 15px; font-weight: bold;"></p>
            <div class="grid-2">
                <button class="btn-green" onclick="togglePublish(true)">🚀 Công Bố Bảng Đấu (Ẩn Form Đăng Ký)</button>
                <button class="btn-yellow" onclick="togglePublish(false)">🔄 Mở Lại Form Đăng Ký (Ẩn Bảng Đấu)</button>
            </div>
        </div>

        <div class="section">
            <h2>1. Danh Sách Các Đội Đã Đăng Ký</h2>
            <button onclick="loadTeams()" style="width: auto; padding: 5px 15px; margin-bottom: 10px;">🔄 Làm mới</button>
            <table id="teamsTable">
                <thead><tr><th>Tên Đội</th><th>Tag</th><th>Đội Trưởng</th><th>SĐT / Zalo</th><th>Discord</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="section">
            <h2>2. Ghép Cặp & Cập Nhật Kết Quả (Tất cả BO3)</h2>
            <div id="matchesContainer"></div>
            <button class="btn-green" onclick="saveAllMatches()" style="margin-top: 15px; font-size: 16px;">💾 LƯU TOÀN BỘ LỊCH THI ĐẤU & KẾT QUẢ</button>
        </div>

        <!-- QUẢN LÝ MAP & TÀI KHOẢN ĐỘI TRƯỞNG -->
        <div class="section" style="border-color: #00bcd4;">
            <h2 style="color: #00bcd4;">3. Quản Lý Trang Random Map & Đội Trưởng</h2>
            
            <div style="background: rgba(0, 188, 212, 0.1); padding: 15px; margin-bottom: 15px; border-radius: 8px;">
                <h3 style="margin-bottom: 10px; color: white;">Cấp tài khoản Đội Trưởng</h3>
                <div class="grid-2">
                    <input type="text" id="capUser" placeholder="Tên đăng nhập (VD: cap_sentinels)">
                    <input type="password" id="capPass" placeholder="Mật khẩu">
                </div>
                <input type="text" id="capTeam" placeholder="Nhập tên Đội (Phải khớp chính xác tên đội đã đăng ký)">
                <button class="btn-green" onclick="createCaptain()" style="margin-top: 10px;">Tạo Tài Khoản Đội Trưởng</button>
            </div>

            <div style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 8px;">
                <h3 style="margin-bottom: 10px; color: white;">Điều khiển màn hình OBS Map</h3>
                <label style="color: var(--val-gray);">Danh sách Map (Cách nhau bằng dấu phẩy):</label>
                <input type="text" id="mapPoolInput" placeholder="Bind, Haven, Split, Ascent, Icebox, Breeze, Fracture, Pearl, Lotus, Sunset, Abyss, MỚI">
                <div class="grid-2" style="margin-top: 10px;">
                    <input type="text" id="obsTeam1" placeholder="Tên Đội 1 (Trên màn hình Map)">
                    <input type="text" id="obsTeam2" placeholder="Tên Đội 2 (Trên màn hình Map)">
                </div>
                <div class="grid-2" style="margin-top: 15px;">
                    <button class="btn-green" onclick="updateMapSettings()">💾 Cập Nhật Cài Đặt Map</button>
                    <button class="btn-yellow" onclick="resetMapDraft()">🔄 Khởi Tạo / Reset Lại Cảnh OBS</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const SUPABASE_URL = 'https://qxrovptliyozkiktcvst.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_0YYA8-eml_uTO6McECoBiQ_xW_mE8My'; 
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let registeredTeamsList = [];

    // 1. ĐĂNG NHẬP
    async function loginAdmin() {
        const u = document.getElementById('adminUser').value.trim();
        const p = document.getElementById('adminPass').value.trim();

        if (!u || !p) {
            alert("Vui lòng nhập đầy đủ tài khoản và mật khẩu!");
            return;
        }

        const { data, error } = await supabaseClient.from('admins').select('*').eq('username', u).eq('password', p).maybeSingle();
        
        if (error) {
            console.error("Lỗi đăng nhập:", error);
            alert("Lỗi kết nối cơ sở dữ liệu!");
            return;
        }

        if (data) {
            alert('✅ Đăng nhập QTV thành công!');
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            await loadTeams();
            await loadSettings();
            await loadMatches();
            await loadMapSettings(); // Tải cài đặt Map hiện tại
        } else { 
            alert('❌ Sai tài khoản hoặc mật khẩu!'); 
        }
    }

    // 2. CÔNG BỐ TRANG CHỦ
    async function loadSettings() {
        const { data, error } = await supabaseClient.from('settings').select('*').eq('id', 'global').maybeSingle();
        if (error) console.error("Lỗi loadSettings:", error);

        const text = document.getElementById('publishStatusText');
        if (data && data.is_bracket_published) {
            text.innerHTML = '🟢 Trang chủ đang hiển thị: <span style="color:#28a745">BẢNG THI ĐẤU & KẾT QUẢ</span>';
        } else {
            text.innerHTML = '🟡 Trang chủ đang hiển thị: <span style="color:var(--val-yellow)">FORM ĐĂNG KÝ THI ĐẤU</span>';
        }
    }

    async function togglePublish(status) {
        const { error } = await supabaseClient.from('settings').upsert({ id: 'global', is_bracket_published: status });
        if (error) {
            alert('Lỗi: ' + error.message);
        } else {
            alert(status ? '🚀 Đã công bố Bảng đấu lên Trang chủ!' : '🔄 Đã chuyển Trang chủ về Form Đăng ký!');
            loadSettings();
        }
    }

    // 3. QUẢN LÝ ĐỘI
    async function loadTeams() {
        const { data, error } = await supabaseClient.from('registrations').select('*');
        if (error) {
            console.error("Lỗi loadTeams:", error);
            return;
        }
        registeredTeamsList = data || [];
        const tbody = document.querySelector('#teamsTable tbody');
        tbody.innerHTML = '';
        registeredTeamsList.forEach(t => {
            tbody.innerHTML += `<tr><td><strong>${t.team_name}</strong></td><td>${t.team_tag || ''}</td><td>${t.leader_name || ''}</td><td>${t.leader_phone || ''}</td><td>${t.leader_discord || ''}</td></tr>`;
        });
    }

    // 4. QUẢN LÝ LỊCH THI ĐẤU
    async function loadMatches() {
        const { data: matches, error } = await supabaseClient.from('matches').select('*');
        if (error) console.error("Lỗi loadMatches:", error);

        const orderMap = { 'bk1': 1, 'bk2': 2, 'th3': 3, 'ck': 4 };
        if (matches) {
            matches.sort((a, b) => (orderMap[a.id] || 99) - (orderMap[b.id] || 99));
        }

        const container = document.getElementById('matchesContainer');
        container.innerHTML = '';

        let teamOptions = `<option value="">-- Chưa xác định --</option>`;
        registeredTeamsList.forEach(t => { teamOptions += `<option value="${t.team_name}">${t.team_name} (${t.team_tag})</option>`; });

        if (!matches) return;

        matches.forEach(m => {
            container.innerHTML += `
                <div class="match-box" id="match_${m.id}">
                    <h3 style="color: var(--val-red); margin-bottom: 10px;">${m.round_name || m.id.toUpperCase()}</h3>
                    <div class="grid-2">
                        <div><label>Đội 1:</label><select class="t1">${teamOptions}</select></div>
                        <div><label>Đội 2:</label><select class="t2">${teamOptions}</select></div>
                    </div>
                    <div class="grid-2" style="margin-top: 10px;">
                        <div><label>Thời gian:</label><input type="text" class="time" placeholder="VD: 20:00 - 15/07/2026" value="${m.match_time || ''}"></div>
                        <div><label>Tỷ số BO3:</label><input type="text" class="score" placeholder="VD: 2 - 1" value="${m.score || ''}"></div>
                    </div>
                    <div style="margin-top: 10px;">
                        <label style="color: var(--val-yellow);">👑 Đội Chiến Thắng:</label><select class="win">${teamOptions}</select>
                    </div>
                </div>
            `;
            const box = document.getElementById(`match_${m.id}`);
            if (m.team1_name) box.querySelector('.t1').value = m.team1_name;
            if (m.team2_name) box.querySelector('.t2').value = m.team2_name;
            if (m.winner) box.querySelector('.win').value = m.winner;
        });
    }

    async function saveAllMatches() {
        const ids = ['bk1', 'bk2', 'th3', 'ck'];
        for (let id of ids) {
            const box = document.getElementById(`match_${id}`);
            if (!box) continue;
            const updateData = {
                id: id,
                team1_name: box.querySelector('.t1').value || null,
                team2_name: box.querySelector('.t2').value || null,
                match_time: box.querySelector('.time').value.trim() || null,
                score: box.querySelector('.score').value.trim() || null,
                winner: box.querySelector('.win').value || null
            };
            const { error } = await supabaseClient.from('matches').upsert(updateData);
            if (error) console.error(`Lỗi khi lưu trận ${id}:`, error);
        }
        alert('💾 Đã lưu thành công toàn bộ lịch đấu và kết quả!');
        loadMatches();
    }

    // 5. QUẢN LÝ ĐỘI TRƯỞNG & MAP DRAFT
    async function createCaptain() {
        const u = document.getElementById('capUser').value.trim();
        const p = document.getElementById('capPass').value.trim();
        const t = document.getElementById('capTeam').value.trim();
        if(!u || !p || !t) return alert('Vui lòng điền đủ thông tin tài khoản!');
        
        const { error } = await supabaseClient.from('captain_accounts').insert([{ username: u, password: p, team_name: t }]);
        if(error) alert('Lỗi: ' + error.message);
        else { 
            alert('✅ Đã tạo tài khoản cho đội ' + t); 
            document.getElementById('capUser').value = ''; 
            document.getElementById('capPass').value = ''; 
            document.getElementById('capTeam').value = '';
        }
    }

    // Tải cấu hình Map hiện tại lên Form Admin
    async function loadMapSettings() {
        const { data, error } = await supabaseClient.from('map_draft').select('*').eq('id', 1).maybeSingle();
        if (error) {
            console.error("Lỗi loadMapSettings:", error);
            return;
        }
        if (data) {
            if (data.maps_pool) document.getElementById('mapPoolInput').value = data.maps_pool;
            if (data.team1_name) document.getElementById('obsTeam1').value = data.team1_name;
            if (data.team2_name) document.getElementById('obsTeam2').value = data.team2_name;
        }
    }

    // Cập nhật Cài Đặt Map (Dùng .upsert để tự thêm row id=1 nếu chưa có)
    async function updateMapSettings() {
        const pool = document.getElementById('mapPoolInput').value.trim();
        const t1 = document.getElementById('obsTeam1').value.trim();
        const t2 = document.getElementById('obsTeam2').value.trim();
        
        const { error } = await supabaseClient.from('map_draft').upsert({ 
            id: 1, 
            maps_pool: pool, 
            team1_name: t1, 
            team2_name: t2 
        });
        
        if (error) {
            console.error("Lỗi updateMapSettings:", error);
            alert('❌ Lỗi cập nhật Map: ' + error.message);
        } else {
            alert('✅ Đã cập nhật thành công cấu hình màn hình Map!');
        }
    }

    // Reset Cảnh OBS (Dùng .upsert để tránh lỗi nếu row id=1 chưa tồn tại)
    async function resetMapDraft() {
        if (!confirm('Bạn có chắc muốn Reset trạng thái Sẵn Sàng và Map đã random không?')) return;
        
        const { error } = await supabaseClient.from('map_draft').upsert({ 
            id: 1,
            team1_ready: false, 
            team2_ready: false, 
            selected_map: null, 
            status: 'waiting' 
        });

        if (error) {
            console.error("Lỗi resetMapDraft:", error);
            alert('❌ Lỗi Reset: ' + error.message);
        } else {
            alert('✅ Đã Reset màn hình Map về trạng thái chờ!');
        }
    }
</script>
</body>
</html>
